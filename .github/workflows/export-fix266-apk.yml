name: Export FIX266 APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/export-fix266-apk.yml'

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify APK
        shell: bash
        run: test -f artifacts/DetoxLock_FIX266_v3.0.24_debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DetoxLock-FIX266-v3.0.24-debug-apk-export
          path: artifacts/DetoxLock_FIX266_v3.0.24_debug.apk
          if-no-files-found: error

      - name: Publish run ID
        shell: bash
        run: |
          set -euo pipefail
          echo "run_id=$GITHUB_RUN_ID commit=$GITHUB_SHA" > artifacts/FIX266_EXPORT_RUN.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add artifacts/FIX266_EXPORT_RUN.txt
          if ! git diff --cached --quiet; then
            git commit -m 'Publish FIX266 APK export run'
            git push
          fi
