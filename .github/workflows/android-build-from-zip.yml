name: Android APK Build From ZIP

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - '.github/workflows/android-build-from-zip.yml'
      - 'FIX*_ANDROID.patch*'
      - '*.zip'
      - 'source/**/*.zip'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # IMPORTANT:
      # The Android project is inside source/*.zip, so we must unzip/find it first.
      # Do NOT use setup-java cache: gradle here, because GitHub checks for Gradle files
      # before the ZIP is extracted and fails with "No file matched to **/*.gradle*".
      - name: Prepare Android project from ZIP
        shell: bash
        run: |
          set -euo pipefail

          echo "Repository root: $GITHUB_WORKSPACE"

          # Case 1: The Android project is already uploaded as normal files.
          if [[ -f "./gradlew" && ( -f "./settings.gradle" || -f "./settings.gradle.kts" ) ]]; then
            echo "Android project found at repository root."
            echo "PROJECT_DIR=$GITHUB_WORKSPACE" >> "$GITHUB_ENV"
            exit 0
          fi

          # Case 2: User uploaded the source as a ZIP file.
          ZIP_FILE=""
          while IFS= read -r candidate; do
            ZIP_FILE="$candidate"
            break
          done < <(find . -maxdepth 4 -type f -name "*.zip" ! -path "./.git/*" | sort)

          if [[ -z "$ZIP_FILE" ]]; then
            echo "ERROR: No Android project and no ZIP file found."
            echo "Upload the source ZIP under source/ or the repository root."
            exit 1
          fi

          echo "Using source ZIP: $ZIP_FILE"
          rm -rf _unzipped_source
          mkdir -p _unzipped_source
          unzip -q "$ZIP_FILE" -d _unzipped_source

          PROJECT_DIR=""
          while IFS= read -r settings_file; do
            dir="$(dirname "$settings_file")"
            if [[ -f "$dir/gradlew" ]]; then
              PROJECT_DIR="$dir"
              break
            fi
          done < <(find _unzipped_source -type f \( -name "settings.gradle" -o -name "settings.gradle.kts" \) | sort)

          if [[ -z "$PROJECT_DIR" ]]; then
            echo "ERROR: Could not find an Android Gradle project inside the ZIP."
            echo "Expected settings.gradle/settings.gradle.kts and gradlew."
            echo "Found top-level files:"
            find _unzipped_source -maxdepth 4 -type f | sort | head -100
            exit 1
          fi

          PROJECT_DIR_ABS="$GITHUB_WORKSPACE/$PROJECT_DIR"
          echo "Android project detected at: $PROJECT_DIR_ABS"
          echo "PROJECT_DIR=$PROJECT_DIR_ABS" >> "$GITHUB_ENV"

      - name: Reconstruct FIX264 patch
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          PARTS=("$GITHUB_WORKSPACE"/FIX264_ANDROID.patch.gz.b64.part*)
          if (( ${#PARTS[@]} == 0 )); then
            echo "ERROR: FIX264 patch payload parts are missing."
            exit 1
          fi
          cat "${PARTS[@]}" | base64 --decode | gzip --decompress > "$GITHUB_WORKSPACE/FIX264_ANDROID.patch"
          echo "FIX264 patch SHA-256:"
          sha256sum "$GITHUB_WORKSPACE/FIX264_ANDROID.patch"

      - name: Apply DetoxLock source patches
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          for PATCH_NAME in \
            FIX261_ANDROID.patch \
            FIX262_ANDROID.patch \
            FIX263_META_ANDROID.patch \
            FIX263_SERVICE_A_ANDROID.patch \
            FIX263_SERVICE_B_ANDROID.patch \
            FIX264_ANDROID.patch; do
            PATCH_FILE="$GITHUB_WORKSPACE/$PATCH_NAME"
            if [[ ! -f "$PATCH_FILE" ]]; then
              echo "Skipping missing patch: $PATCH_NAME"
              continue
            fi
            echo "Applying: $PATCH_FILE"
            patch --dry-run -p1 < "$PATCH_FILE"
            patch -p1 < "$PATCH_FILE"
          done

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        shell: bash
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Show detected project files
        shell: bash
        run: |
          echo "PROJECT_DIR=$PROJECT_DIR"
          ls -la "$PROJECT_DIR"

      - name: Make Gradle wrapper executable
        shell: bash
        run: chmod +x "$PROJECT_DIR/gradlew"

      - name: Test and build debug APK
        id: gradle_build
        shell: bash
        run: |
          set +e
          cd "$PROJECT_DIR"
          ./gradlew --no-daemon testDebugUnitTest assembleDebug 2>&1 | tee "$GITHUB_WORKSPACE/FIX264_BUILD.log"
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "exit_code=$BUILD_EXIT" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Collect APK files
        if: steps.gradle_build.outputs.exit_code == '0'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$GITHUB_WORKSPACE/_apk_output"
          mkdir -p "$GITHUB_WORKSPACE/_apk_output"
          find "$PROJECT_DIR" -path "*/build/outputs/apk/debug/*.apk" -type f -exec cp -v {} "$GITHUB_WORKSPACE/_apk_output/" \;
          echo "APK output:"
          ls -la "$GITHUB_WORKSPACE/_apk_output"

      - name: Publish FIX264 build result to repository
        if: always()
        shell: bash
        env:
          BUILD_EXIT: ${{ steps.gradle_build.outputs.exit_code }}
        run: |
          set -euo pipefail
          BUILD_EXIT="${BUILD_EXIT:-1}"
          mkdir -p "$GITHUB_WORKSPACE/artifacts"
          if [[ -f "$GITHUB_WORKSPACE/FIX264_BUILD.log" ]]; then
            cp "$GITHUB_WORKSPACE/FIX264_BUILD.log" "$GITHUB_WORKSPACE/artifacts/FIX264_BUILD.log"
          else
            echo "Build did not reach the Gradle logging step." > "$GITHUB_WORKSPACE/artifacts/FIX264_BUILD.log"
          fi
          if [[ "$BUILD_EXIT" == "0" ]]; then
            APK_FILE="$(find "$GITHUB_WORKSPACE/_apk_output" -maxdepth 1 -type f -name '*.apk' | sort | head -1)"
            if [[ -z "$APK_FILE" ]]; then
              echo "Build reported success but no APK was collected." > "$GITHUB_WORKSPACE/artifacts/FIX264_BUILD_STATUS.txt"
              BUILD_EXIT=1
            else
              cp "$APK_FILE" "$GITHUB_WORKSPACE/artifacts/DetoxLock_FIX264_v3.0.22_debug.apk"
              echo "SUCCESS commit=$GITHUB_SHA" > "$GITHUB_WORKSPACE/artifacts/FIX264_BUILD_STATUS.txt"
            fi
          else
            echo "FAILED commit=$GITHUB_SHA exit=$BUILD_EXIT" > "$GITHUB_WORKSPACE/artifacts/FIX264_BUILD_STATUS.txt"
          fi

          cd "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/FIX264_BUILD.log artifacts/FIX264_BUILD_STATUS.txt
          if [[ -f artifacts/DetoxLock_FIX264_v3.0.22_debug.apk ]]; then
            git add artifacts/DetoxLock_FIX264_v3.0.22_debug.apk
          fi
          if ! git diff --cached --quiet; then
            git commit -m "Publish FIX264 debug build result"
            git push
          fi
          if [[ "$BUILD_EXIT" != "0" ]]; then exit "$BUILD_EXIT"; fi

      - name: Upload APK artifact
        if: steps.gradle_build.outputs.exit_code == '0'
        uses: actions/upload-artifact@v4
        with:
          name: DetoxLock-FIX264-debug-apk
          path: _apk_output/*.apk
          if-no-files-found: error
