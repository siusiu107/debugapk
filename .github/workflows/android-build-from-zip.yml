name: Android APK Build From ZIP

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - '.github/workflows/android-build-from-zip.yml'
      - '*.zip'
      - 'source/**/*.zip'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # IMPORTANT:
      # The Android project is inside source/*.zip, so we must unzip/find it first.
      # Do NOT use setup-java cache: gradle here, because GitHub checks for Gradle files
      # before the ZIP is extracted and fails with "No file matched to **/*.gradle*".
      - name: Prepare Android project from ZIP
        shell: bash
        run: |
          set -euo pipefail

          echo "Repository root: $GITHUB_WORKSPACE"

          # Case 1: The Android project is already uploaded as normal files.
          if [[ -f "./gradlew" && ( -f "./settings.gradle" || -f "./settings.gradle.kts" ) ]]; then
            echo "Android project found at repository root."
            echo "PROJECT_DIR=$GITHUB_WORKSPACE" >> "$GITHUB_ENV"
            exit 0
          fi

          # Case 2: User uploaded the source as a ZIP file.
          ZIP_FILE=""
          while IFS= read -r candidate; do
            ZIP_FILE="$candidate"
            break
          done < <(find . -maxdepth 4 -type f -name "*.zip" ! -path "./.git/*" | sort)

          if [[ -z "$ZIP_FILE" ]]; then
            echo "ERROR: No Android project and no ZIP file found."
            echo "Upload the source ZIP under source/ or the repository root."
            exit 1
          fi

          echo "Using source ZIP: $ZIP_FILE"
          rm -rf _unzipped_source
          mkdir -p _unzipped_source
          unzip -q "$ZIP_FILE" -d _unzipped_source

          PROJECT_DIR=""
          while IFS= read -r settings_file; do
            dir="$(dirname "$settings_file")"
            if [[ -f "$dir/gradlew" ]]; then
              PROJECT_DIR="$dir"
              break
            fi
          done < <(find _unzipped_source -type f \( -name "settings.gradle" -o -name "settings.gradle.kts" \) | sort)

          if [[ -z "$PROJECT_DIR" ]]; then
            echo "ERROR: Could not find an Android Gradle project inside the ZIP."
            echo "Expected settings.gradle/settings.gradle.kts and gradlew."
            echo "Found top-level files:"
            find _unzipped_source -maxdepth 4 -type f | sort | head -100
            exit 1
          fi

          PROJECT_DIR_ABS="$GITHUB_WORKSPACE/$PROJECT_DIR"
          echo "Android project detected at: $PROJECT_DIR_ABS"
          echo "PROJECT_DIR=$PROJECT_DIR_ABS" >> "$GITHUB_ENV"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        shell: bash
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Show detected project files
        shell: bash
        run: |
          echo "PROJECT_DIR=$PROJECT_DIR"
          ls -la "$PROJECT_DIR"

      - name: Make Gradle wrapper executable
        shell: bash
        run: chmod +x "$PROJECT_DIR/gradlew"

      - name: Build debug APK
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          ./gradlew --no-daemon assembleDebug

      - name: Collect APK files
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$GITHUB_WORKSPACE/_apk_output"
          mkdir -p "$GITHUB_WORKSPACE/_apk_output"
          find "$PROJECT_DIR" -path "*/build/outputs/apk/debug/*.apk" -type f -exec cp -v {} "$GITHUB_WORKSPACE/_apk_output/" \;
          echo "APK output:"
          ls -la "$GITHUB_WORKSPACE/_apk_output"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DetoxLock-debug-apk
          path: _apk_output/*.apk
          if-no-files-found: error
